name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pre-commit checks
        run: |
          pre-commit install
          pre-commit run --all-files

      - name: Run tests with coverage
        run: pytest --cov=ddf_toolkit --cov-fail-under=85 tests/

      - name: Smoke test — CLI help
        run: ddf --help

      - name: Smoke test — version
        run: ddf version

      - name: Smoke test — validate pilot DDFs
        run: |
          ddf validate tests/fixtures/ddfs/microsoft_calendar.csv
          ddf validate tests/fixtures/ddfs/daikin_stylish.csv

      - name: Smoke test — lint pilot DDFs
        run: |
          ddf lint tests/fixtures/ddfs/microsoft_calendar.csv
          ddf lint tests/fixtures/ddfs/daikin_stylish.csv

      - name: Smoke test — simulate pilot DDF
        run: |
          ddf simulate tests/fixtures/ddfs/microsoft_calendar.csv \
            --capture tests/fixtures/captures/microsoft_calendar_oauth_flow.har \
            --freeze-time 1745571600.0

      - name: Build wheel and sdist
        run: python -m build

      - name: Build Docker image
        run: docker build -t joeexafionbot-dev/ddf-toolkit .
